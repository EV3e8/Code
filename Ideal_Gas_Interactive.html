//Mathematical operations
function sum(A){
var sum = 0;
for(var x = 0; x < A.length; x++){
sum = sum + A[x];
}    
return sum;
}
function mean(A){
var mean;
mean = sum(A)/A.length;
return mean;
}
function median(A){
var median;
var sortList = A.sort(function(a, b){return a - b;});
if(A.length/2 == Math.round(A.length/2)){
median = mean(sortList[A.length/2 - 1], sortList[A.length/2]);
}
if(A.length/2 !== Math.round(A.length/2)){
median = sortList(Math.ceil(A.length/2) - 1);
}
return median;
}
function mode(A){
var sortA = A.sort(function(a, b){return a - b;});
var frequencyList = [];
var mode = [];
for(var x = 0; x < A.length; x++){
if(x == 0){frequencyList.push({number:sortA[x], frequency:1});}
else{
if(sortA[x] == sortA[x - 1]){frequencyList[frequencyList.length - 1].frequency++;}	
else{frequencyList.push({number:sortA[x], frequency:1});}
}

}

var sortFrequencyList = frequencyList.sort(function(a, b){return a.frequency - b.frequency;});

for(var y = sortFrequencyList.length - 1; y > -1; y--){

}

}
mode.sort(function(a, b){return a - b;});

function root_mean_square(A){

for(var x = 0; x < A.length; x++){
sum_of_squares = sum_of_squares + Math.pow(A[x], 2);

//Vector operations
function scale(A, scaling){
var result = {x:A.x * scaling, y:A.y * scaling, z:A.z * scaling};

}
function magnitude(A){
return Math.sqrt(A.x * A.x +  A.y * A.y +  A.z * A.z);	
}
function normalize(A){
var result;
if(magnitude(A) > 0){
result = scale(A, 1/magnitude(A));}
else{result = {x:0, y:0, z:0};}
return result;
}
function add(A, B){
var result = {x:A.x +  B.x, y:A.y +  B.y, z:A.z +  B.z};

}
function subtract(A, B){
var result = {x:A.x - B.x, y:A.y - B.y, z:A.z - B.z};

return result;
}
function dot(A, B){
return A.x  *  B.x +  A.y  *  B.y +  A.z  *  B.z;
}
function cross(A, B){
var result = {x:A.y * B.z - A.z * B.y, y:A.z * B.x - A.x * B.z, z:A.x * B.y - A.y * B.x};
return result;
}
function rotate(A, axis, angle){
//Rodrigues's rotation formula
var e = normalize(axis);
var term1 = scale(A, Math.cos(angle));
var term2  = scale(cross(e, A), Math.sin(angle));
var term3 = scale(e, dot(e, A)*(1 - Math.cos(angle)));

var result = add(add(term1, term2), term3);

return result;
}

function cartesian_to_kepler(position, velocity, time, mass, center, unit){

if(dot(r, v) < 0){
TA = 2 * Pi - TA; 
}
var W = Math.atan2(r.z/Math.sin(IN), (r.x * Math.cos(OM) + r.y * Math.sin(OM))) - TA;
W = (W + 2 * Pi) % (2 * Pi);
var EA = 2 * Math.atan(Math.pow((1 - EC)/(1 + EC), 1/2) * Math.tan(TA/2));
EA = (EA + 2 * Pi) % (2 * Pi);
var T = t - 1/(Math.pow(GM/Math.pow(a, 3), 1/2)) * (EA - EC * Math.sin(EA));

var MA = EA - EC * Math.sin(EA);

var PR = 2 * Pi * Math.pow(Math.pow(A, 3)/GM, 1/2);

if(unit == "degree"){
orbital_elements = {EC:EC, A:A, IN:IN * 180/Pi, OM:OM * 180/Pi, W:W * 180/Pi, TA:TA * 180/Pi, MA:MA * 180/Pi};
}
if(unit == "radian"){
    orbital_elements = {EC:EC, A:A, IN:IN, OM:OM, W:W, TA:TA, MA:MA};

function kepler_to_cartesian(Mass, time, time_at_periapsis, eccentricity, semi_major_axis, inclination, longitude_of_the_ascending_node, argument_of_the_periapsis, unit){
//Ω is longitude of ascending node, or right ascension of ascending node
//ω is the argmuent of periapsis 
//ν is the true anomaly
//µ is GM
//i is inclination
//a is semi-major axis
//e is eccentricity
//MA is mean anomaly
//EA is eccentric anomaly
//p is semi-latus rectum equal to a(1-e^2)

var i = inclination;
var argument_of_periapsis = argument_of_the_periapsis;
var longitude_of_ascending_node = longitude_of_the_ascending_node;
if(unit == "degree"){
	i = inclination * Pi/180;
	longitude_of_ascending_node = Pi/180 * longitude_of_the_ascending_node;
	argument_of_periapsis = Pi/180 * argument_of_the_periapsis;
	
}

var position = {x:0, y:0, z:0};
var velocity = {x:0, y:0, z:0};
var iterations = 10000;
var a = semi_major_axis;
var e = eccentricity;
var mean_anomaly = Math.pow(Gravitational_Constant * Mass/Math.pow(a, 3), 1/2) * (time - time_at_periapsis); //Angle of orbit completed at given time (∆t/T)
var MA = mean_anomaly;
var eccentric_anomaly = 0;
var n = 0;
while(n < iterations){
eccentric_anomaly = eccentric_anomaly - (eccentric_anomaly - e * Math.sin(eccentric_anomaly) - MA)/(1 - eccentric_anomaly * Math.cos(eccentric_anomaly));
n++;
}
var EA = eccentric_anomaly;

var true_anomaly = 2 * Math.atan(Math.pow((1+e)/(1-e), 1/2) * Math.tan(EA/2));

var radius = a * (1 - e * Math.cos(EA));
var r = radius;

var p = a * (1 - Math.pow(e, 2));

var specific_angular_momentum = Math.pow(Gravitational_Constant * Mass * a * (1-Math.pow(e, 2)), 1/2);
var h = specific_angular_momentum;

position.x = r * (Math.cos(longitude_of_ascending_node) * Math.cos(argument_of_periapsis + true_anomaly) - Math.sin(longitude_of_ascending_node) * Math.sin(argument_of_periapsis + true_anomaly) * Math.cos(i));
position.y = r * (Math.sin(longitude_of_ascending_node) * Math.cos(argument_of_periapsis + true_anomaly) + Math.cos(longitude_of_ascending_node) * Math.sin(argument_of_periapsis + true_anomaly) * Math.cos(i));
position.z = r * (Math.sin(i) * Math.sin(argument_of_periapsis + true_anomaly)); 

velocity.x = (position.x * h * e)/(r * p) * Math.sin(true_anomaly) - h/r * (Math.cos(longitude_of_ascending_node) * Math.sin(argument_of_periapsis + true_anomaly) + Math.sin(longitude_of_ascending_node) * Math.cos(argument_of_periapsis + true_anomaly) * Math.cos(i)); 
velocity.y = (position.y * h * e)/(r * p) * Math.sin(true_anomaly) - h/r * (Math.sin(longitude_of_ascending_node) * Math.sin(argument_of_periapsis + true_anomaly) - Math.cos(longitude_of_ascending_node) * Math.cos(argument_of_periapsis + true_anomaly) * Math.cos(i));
velocity.z = (position.z * h * e)/(r * p) * Math.sin(true_anomaly) + h/r *(Math.sin(i) * Math.cos(argument_of_periapsis + true_anomaly));


return [{x:position.x, y:position.y, z:position.z}, {x:velocity.x, y:velocity.y, z:velocity.z}];
}

//Lambert problem
function lambert_solve(mu, r1, r2, dt, ot){
//Mu is GM
//r1 is the vector from sun to initial position
//r2 is the vector from sun to final position
//dt is the difference in times
//ot is the orbit type (1 = prograde, 2 = retrograde)

var tdiff = 1e8; //Set as an initial value for iteration
var nrev = 0; //Number of revolutions
var itermax = 2000; //Max number of iterations
var tol = 1e-8; //Convergence tolerance
var error1 = 0; //Error flag
var r1mag = magnitude(r1); //Magnitude of initial position vector
var r2mag = magnitude(r2); //Magnitude of final position vector
var r1unit = normalize(r1); //Unit vector for r1
var r2unit = normalize(r2); //Unit vector for r2

// Cross product of r1 and r2 vectors (used for orbital geometry)
var c12 = cross(r1, r2);
var c12mag = magnitude(c12); //Magnitude of cross product
var c12unit = normalize(c12); //Unit vector of cross product
var nu = Math.acos(dot(r1, r2) / (r1mag * r2mag)); //True anomaly angle
//var nu_before = nu;
if(ot == 1){
if(c12.z <= 0){
nu = 2 * Pi - nu;    
}    
}
if(ot == 2){
if(c12.z >= 0){
nu = 2 * Pi - nu;    
}    
}

// Tangential unit vectors which are perpendicular to r1 and r2
var tan1u = cross(c12unit, r1unit);
var tan2u = cross(c12unit, r2unit);

//Adjust vectors if angle is greater than pi
if(nu >= Pi){
tan1u = scale(tan1u, -1);
tan2u = scale(tan2u, -1);
}

//Constants determined by the geometry of the problem
var c = Math.sqrt(r1mag * r1mag + r2mag * r2mag - 2 * r1mag * r2mag * Math.cos(nu));
var s = (r1mag + r2mag + c)/2; //Semi perimeter of triangle
var t = Math.sqrt(8.0 * mu/Math.pow(s, 3)) * dt; //Time parameter based on the transfer time
var q = Math.sqrt(r1mag * r2mag)/ s * Math.cos(nu * 0.5); //Lambert parameter

//Adjust lambert parameter q based on the true anomaly
if(nu <= Pi){
q = Math.abs(q);
}
else{
q = -Math.abs(q);
}

function sigma(u){
var sigm = -2 * (Math.sqrt(u) * Math.sqrt(1 - u) - Math.asin(Math.sqrt(u)))/Math.pow(Math.sqrt(u), 3);
var dsigma = -(u/Math.sqrt(1 - u) + (3 * Math.asin(Math.sqrt(u)))/Math.sqrt(u) - 3 / Math.sqrt((1 - u))) / Math.pow(u, 2);
var d2sigma = (15.0 * Math.asin(Math.sqrt(u)) * Math.pow(Math.sqrt(1 - u), 3) - 15 * Math.sqrt(u) + 20 * Math.pow(Math.sqrt(u), 3) - 3 * Math.pow(Math.sqrt(u), 5)) / (2 * Math.pow(Math.sqrt(u), 7) * Math.pow(Math.sqrt((1-u)), 3));
return [sigm, dsigma, d2sigma];
}
function time_derivatives(x, q, nrev){
// This function calculates the time-of-flight equations and their derivatives.
// Inputs:
// x    = current x estimate
// q    = Lambert parameter
// nrev = number of revolutions
// Outputs:
// t   = calculated time-of-flight
// td1 = time-of-flight first derivative
// td2 = time-of-flight second derivative    
var tol = 1e-8;
var delt = 1e-1;
var xx = x;

//Handles special cases during near x = -1
if(xx < -1){
xx = Math.abs(xx) - 2;
}
else if(x == -1){
xx = x + delt;
}
var e = Math.pow(xx, 2) - 1;


if(xx == 1){

var t = 4.0/3.0 * (1.0 - Math.pow(q, 3));
var td1 = 4.0/5.0 * (Math.pow(q, 5) - 1.0);
var td2 = td1 + 120.0/70.0 * (1.0 - Math.pow(q, 7));

}
else if(Math.abs(xx - 1.0) < tol){
[sig1, dsig1, d2sig1] = sigma(-e);
[sig2, dsig2, d2sig2] = sigma(-e * Math.pow(q, 2));
var t = sig1 - Math.pow(q, 3) * sig2;
var td1 = 2.0 * x * (Math.pow(q, 5.0) * dsig2 - dsig1);
var td2 = td1 / x + 4.0 * Math.pow(x, 2) * (d2sig1 - Math.pow(q, 7.0) * d2sig2);
}
else{
var y = Math.sqrt(Math.abs(e));
var z = Math.sqrt(1.0 - Math.pow(q, 2) + Math.pow(q, 2) * Math.pow(x, 2));
var f = y * (z - q * x);
var u = -e;
var g = (Math.pow(x, 2) - Math.pow(q, 2) * (-e)) / (x * z - q * (-e));

if(e < 0){
var d = Math.atan2(f, g) + Pi * nrev;}
else{
var d = Math.atanh(f / g);   
}
var t = 2.0 * (x - q * z - d / y) / e;
var td1 = (3.0 * x * t + 4.0 * Math.pow(q, 3) * x / z - 4.0) / u;
var td2 = (3.0 * t + 5.0 * x * td1 + 4.0 * Math.pow((q / z), 3) * (1.0 - Math.pow(q, 2))) / u;
}
return [t, td1, td2];
}

// Initial conditions for time derivatives
var t0 = time_derivatives(0.0, q, nrev)[0];
var t0_before = t0;
if ((t0 - t) < 0.0){
var signx = -1;  // Set sign for prograde case
    }
else{
var signx = 1;   // Set sign for retrograde case
    }

var c1 = 0.5;
var c2 = 0.03;

if(signx == 1){
var x0 = t0 * (t0 - t) / (4 * t);
}

else{
var x01 = -(t - t0) / (t - t0 + 4.0);
var x02 = -Math.sqrt((t - t0) / (t + 0.5 * t0));
var  w_big = x01 + c1 * Math.sqrt(2.0 - nu / Pi);
if(w_big >= 0){
var x03 = x01;
}
else{
var w_little = Math.sqrt(Math.sqrt(Math.sqrt(Math.sqrt(-w_big))));
var x03 = x01 + w_little * (x02 - x01);
}
var lam = 1.0 + c1 * x03 * (4.0 / (4.0 - t - t0)) - c2 * Math.pow(x03, 2) * Math.sqrt(1.0 + x01);
var x0 = lam * x03;
}

if (x0 <= -1){
var error1 = 1;}

var gamma = Math.sqrt(mu * s / 2.0); //Orbital mechanics constant
//If there is no solution found, this is run
if(error1 == 1){
var v1 = {x:1e7, y:1e7, z:1e7};
var v2 = {x:1e7, y:1e7, z:1e7};   
}
//If there is no error
else{
//Initialize iteration for finding the solution
var iter = 0;
var x = x0;

while(Math.abs(tdiff) >= tol && iter <= itermax){
        iter = iter + 1;
        [t2, td1, td2] = time_derivatives(x, q, nrev);  // Calculate time derivatives
        tdiff = t2 - t;  // Time difference
        var x_new = x - 2.0 * tdiff * td1 / (2.0 * Math.pow(td1, 2) - tdiff * td2);  // Update x
        x = x_new;
    }

    //If no solution is found

    
if (iter >= itermax){
        // No solution found, set velocity vectors to large values
        var v1 = {x:1.0e12, y:1.0e12, z:1.0e12};
        var v2 = {x:1.0e12, y:1.0e12, z:1.0e12};
    }

else{

// Calculate the velocity components


if (c == 0){
    var sig = 1.0;
    var rho = 0.0;
    var z = Math.abs(x);
}
else{
var sig = 2.0 * Math.sqrt(r1mag * r2mag / Math.pow(c, 2)) * Math.sin(0.5 * nu);
var rho = (r1mag - r2mag) / c;
var z = Math.sqrt(1.0 + Math.pow(q, 2) * (Math.pow(x, 2) - 1.0));    
}

// Radial components of velocity

var dum = gamma * ((q * z - x) - rho * (q * z + x)) / r1mag;
var vr1 = scale(r1unit, dum);
var dum = -gamma * ((q * z - x) + rho * (q * z + x)) / r2mag;
var vr2 = scale(r2unit, dum);
    
// Tangential components of velocity

var dum = gamma * sig * (z + q * x);
var vt1 = scale(tan1u, dum / r1mag);
var vt2 = scale(tan2u, dum / r2mag);
var v1 = add(vr1, vt1);  // Final initial velocity vector
var v2 = add(vr2, vt2);  // Final velocity vector
    }
}

var vi = v1;
var vf = v2;

//return [vi, vf, nu_before];
//return [vi, vf, t];
return [vi, vf];

}

//Kepler approximation for future position

function future_motion(mu, r, v, dt){
var m = mu/Gravitational_Constant;
var orbital_elements = cartesian_to_kepler(r, v, 0, m, {x:0, y:0, z:0}, "radian");
var MA_motion = orbital_elements.MA;
var TA_motion = orbital_elements.TA;
var W_motion = orbital_elements.W;
var IN_motion = orbital_elements.IN;
var OM_motion = orbital_elements.OM;
var EC_motion = orbital_elements.EC;
var A_motion = orbital_elements.A;
var Tp = -MA_motion/Math.sqrt(mu/Math.pow(A_motion, 3));
var final_motion = kepler_to_cartesian(m, dt, Tp, EC_motion, A_motion, IN_motion, OM_motion, W_motion, "radian");
return final_motion;
}

function numerical_future_motion(mu, r, v, dt){
var r_new = {x:r.x, y:r.y, z:r.z};
var v_new = {x:v.x, y:v.y, z:v.z};
var a;
var h = 1;
var t = 0;
var time_duration = dt;
while(t < time_duration){ 
a = scale(normalize(r_new), -mu/Math.pow(magnitude(r_new), 2));
v_new.x = v_new.x + a.x * h;
v_new.y = v_new.y + a.y * h;
v_new.z = v_new.z + a.z * h;

r_new.x = r_new.x + v_new.x * h;
r_new.y = r_new.y + v_new.y * h;
r_new.z = r_new.z + v_new.z * h;

t+=h;	
}

function CSV_convertor(data, header){
var CSV =  header[0];
var h = 1;
while(h < header.length){
CSV = CSV + "," + header[h];
h++;
}
var rows = 0;
while(rows < data.length){

function momentum_transfer(v1, v2, m, M, beta){
var U = v1;
var E = normalize(scale(U, -1));
var M_delta_v =  add(scale(U, m), scale(E, m * (beta - 1) * dot(E, U)));
var delta_v = scale(M_delta_v, 1/M);
var v_new = add(delta_v, v2);
return v_new;
}

function perspective(A, C, Angle, E){
//A is the position of the object, C is the position of the viewer, Angle is the angle of the camera, and E is the position of the display surface

var sine = {x:Math.sin(Angle.x), y:Math.sin(Angle.y), z:Math.sin(Angle.z)};
var p = subtract(A, C);
var d = {x:cosine.y * (sine.z * p.y +  cosine.z * p.x) - sine.y * p.z, y:sine.x * (cosine.y * p.z +  sine.y * (sine.z * p.y +  cosine.z * p.x)) +  cosine.x * (cosine.z * p.y - sine.z * p.x), z:cosine.x * (cosine.y * p.z +  sine.y * (sine.z * p.y +  cosine.z * p.x)) - sine.x * (cosine.z * p.y - sine.z * p.x)};
//B is the mapped coordinate. In a pinhole camera, they are flipped, so the sines are reversed to make it the correct orientation.
var b = {x: - 1 * (E.z/d.z  *  d.x +  E.x), y: - 1 * (E.z/d.z  *  d.y +  E.y)};

return b;
}

//Other use functions
function evenSphere(position, radius, samples){
var points = [];
var phi = Pi * (Math.sqrt(5) - 1);
var i = 0;
while(i < samples){
var Y = radius - (i/(samples - 1)) * 2 * radius;
var rad = Math.sqrt(radius * radius - Y * Y);
var theta = phi * i;
var X = Math.cos(theta) * rad;
var Z = Math.sin(theta) * rad;
points.push({x:X + position.x, y:Y + position.y, z:Z + position.z});
i++;
}
return points;
}

//Gravity 
function Magnitude_Of_Gravitational_Force(m1, m2, distance){
return Gravitational_Constant * m1 * m2/(Math.pow(distance, 2));
}
function Gravity(m1, m2, p1, p2){
var result = scale(normalize(subtract(p2, p1)), Magnitude_Of_Gravitational_Force(m1, m2, magnitude(subtract(p2, p1))));
return result;
}

//Coulomb Force
function ElectricForce(q1, q2, distance){
return Math.abs(q1 * q2)/(4 * Pi * permittivity_of_free_space * (distance * distance));    
}
function Coulomb(q1, q2, p1, p2){
var result;
if(q1 == 0 || q2 == 0)
{result = {x:0, y:0, z:0};}
else{
result = scale(normalize(subtract(p2, p1)), -Math.abs(q1 * q2)/(q1 * q2) * ElectricForce(q1, q2, magnitude(subtract(p2, p1))));
}
return result;
}

//Van Der Waals force
function van_der_Waals_Magnitude(A, r1, r2, d){
var z = d + r1 + r2;
var result = -A/6 * (64 * Math.pow(r1, 3) * Math.pow(r2, 3) * z)/(Math.pow(Math.pow(z, 2) - Math.pow((r1 + r2), 2),2) * Math.pow(Math.pow(z, 2) - Math.pow((r1 - r2), 2),2))
return result;
}
function van_der_Waals_Force(r1, r2, A, p1, p2){
var result = scale(normalize(subtract(p1, p2)), van_der_Waals_Magnitude(A, r1, r2, magnitude(subtract(p2, p1))));
return result;
}

//Drag
function drag_magnitude(density, speed, drag_coefficient, cross_sectional_area){
var result;
result = 0.5 * density * Math.pow(speed, 2) * drag_coefficient * cross_sectional_area;
return result;
}
function drag_force(density, velocity, drag_coefficient, cross_sectional_area){
var result;
result = scale(normalize(velocity), -drag_magnitude(density, magnitude(velocity), drag_coefficient, cross_sectional_area));
return result;
}

// Collisions 
//These were used for the case of two balls colliding. The more general case applicable for any two rigid bodies is using the change in momentum calculation and applying it figure out the final velocities and angular velocities
function collision(v1, v2, m1, m2, e){
return (m1 * v1 +  m2 * v2 +  m2 * e * (v2 - v1))/(m1 +  m2);
}
function solveCollision(p1, p2, v1, v2, m1, m2, e){
var v1Projection = scale(normalize(subtract(p2, p1)), dot(v1, normalize(subtract(p2, p1))));
var v2Projection = scale(normalize(subtract(p1, p2)), dot(v2, normalize(subtract(p1, p2))));
var finalSpeedInDirection = scale(normalize(subtract(p2, p1)), collision(dot(v1, normalize(subtract(p2, p1))), dot(v2, normalize(subtract(p2, p1))), m1, m2, e));
var speedNotInDirection = subtract(v1, v1Projection);
var finalVelocity1 = add(finalSpeedInDirection, speedNotInDirection);
return finalVelocity1;
}

function find_Change_In_Momentum(position1, position2, position_of_collision, velocity1, velocity2, angular_velocity1, angular_velocity2, mass1, mass2, moment_of_Inertia1, moment_of_Inertia2, surface_normal, e){
var r_ac = subtract(position_of_collision, position1); 
var r_bc = subtract(position_of_collision, position2); 
var v_c =  subtract(add(velocity1, cross(angular_velocity1, r_ac)), add(velocity2, cross(angular_velocity2, r_bc)));
var n = normalize(surface_normal);

var change_in_momentum = scale(n, -(1 + e) * dot(v_c, n)/(1/mass1 + 1/mass2 + dot(cross(r_ac, n), cross(r_ac, n))/moment_of_Inertia1 + dot(cross(r_bc, n), cross(r_bc, n))/moment_of_Inertia2));

return change_in_momentum;
}

var term_1 = {x:0, y:0, z:0};
var term_2 = {x:0, y:0, z:0};
var f1 = 0;
var f2 = 0;
var term_3 = {x:0, y:0, z:0};
var term_4 = {x:0, y:0, z:0};

var position_of_object_with_time = add(earlier_position[object], scale(velocity[object], timeChange));
var j = 0;
while(j < numberOfElements){

//The issue was that k wasn't defined as being different than the object and j before, only one of the two. This caused strange effects. I fixed it.
var k = 0;
while(k < numberOfElements){

}
k++;  
}

if(j !== object && small_objects.includes(j) == false){
//General relativity is an extension of Newton's Unversal Law of Gravitation. That is why the first term is Newton's Law of Gravity.
term_1 = add(term_1, scale(Gravity(mass[object], mass[j], position_of_object_with_time, position_of_j_with_time), 1/mass[object]))

}



j++;
}

general_relativity_gravity_part[object] = scale(add(term_1, add(term_2, add(term_3, term_4))), mass[object]);
}


total_force[object] = add(add(add(add(add(gravity_Part[object], coulomb_Part[object]), van_der_Waals_Part[object]), gravityOfEarth_Part[object]), drag_part[object]), general_relativity_gravity_part[object]);

object++;}

return total_force;
}

//Frictional impulse
function findFriction(m, v_c, normal, j, µ_s, µ_k){
var j_f;
var j_r = magnitude(j);
var t;
var n = normalize(normal);
var f_e = forceWithTime(calcNumber, 0, velocity);

if(Math.abs(dot(v_c, n)) > frictionStop){
t = normalize(subtract(v_c, scale(n, dot(v_c, n))));
}
if(Math.abs(dot(v_c, n)) <= frictionStop && Math.abs(dot(f_e, n)) > forceStop){
t = normalize(subtract(f_e, scale(n, dot(f_e, n))));
}
if(Math.abs(dot(v_c, n)) <= frictionStop && Math.abs(dot(f_e, n)) <= forceStop){
t = {x:0, y:0, z:0};
}

var j_s = j_r * µ_s;
var j_k = j_r * µ_k;

if(dot(v_c, t) == 0 && dot(scale(v_c, m), t) <= j_s){
j_f = scale(t, -dot(scale(v_c, m), t));}

if(dot(v_c, t) == 0 && dot(scale(v_c, m), t) > j_s){
j_f = scale(t, -j_s);}

if(dot(v_c, t) > 0){
j_f = scale(t, -j_k);}

return j_f;
}

//Wall Collisions
function wallImpulse(v_ac, m, I, r_ac, normal, e){
var n = normalize(normal);
    var impulse = scale(n, -(1 + e) * dot(v_ac, n)/((1/m + dot((cross(r_ac, n)), (cross(r_ac, n)))/I)));

return impulse;
}

function resolveBallWallCollision(normal, p_c){
var v0 = velocity[calcNumber];
var r = radius[calcNumber];
var m = mass[calcNumber];
var I = moment_of_Inertia[calcNumber];
var w = angular_velocity[calcNumber];
var e = wallElasticity;
var n = normalize(normal);

var v_c = add(v0, cross(w, scale(n, -r)));
impulse = add(impulse, wallImpulse(v_c, m, I, scale(n, -r), n, e));

if(consider_friction == true){
var friction = findFriction(m, v_c, n, impulse, µ_s, µ_k);
impulse = add(impulse, friction);}


velocity[calcNumber] = add(velocity[calcNumber], scale(impulse, 1/m));

angular_velocity[calcNumber] = add(angular_velocity[calcNumber], scale(cross(scale(n, -r), impulse), 1/I));

position[calcNumber] = add(p_c, scale(n, radius[calcNumber]));

}
